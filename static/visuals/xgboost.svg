<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="XGBoost Visual">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2f44"/>
      <stop offset="100%" stop-color="#1d7d96"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg2)"/>
  <g fill="none" stroke="#e7fcff" stroke-width="4" opacity="0.9">
    <polyline points="90,285 210,240 330,205 450,170 570,130 690,95"/>
    <polyline points="90,285 210,260 330,240 450,225 570,210 690,200" opacity="0.45"/>
  </g>
  <g fill="#ffd6a8">
    <circle cx="210" cy="240" r="8"><animate attributeName="cy" values="240;230;240" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="205" r="8"><animate attributeName="cy" values="205;195;205" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="170" r="8"><animate attributeName="cy" values="170;160;170" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="570" cy="130" r="8"><animate attributeName="cy" values="130;120;130" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>
  <text x="36" y="46" fill="#e7fbff" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="700">XGBoost Optimization</text>
  <text x="36" y="78" fill="#cbeaf2" font-size="18" font-family="Segoe UI, Arial, sans-serif">Boosting sequentially reduces residual errors</text>
</svg>
