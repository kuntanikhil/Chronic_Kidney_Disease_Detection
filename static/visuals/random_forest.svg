<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Random Forest Visual">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a3143"/>
      <stop offset="100%" stop-color="#168b79"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg)"/>
  <g fill="none" stroke="#dff8ff" stroke-width="3" opacity="0.85">
    <path d="M140 300 L140 220 L90 170"/>
    <path d="M140 220 L190 170"/>
    <path d="M330 300 L330 220 L280 170"/>
    <path d="M330 220 L380 170"/>
    <path d="M520 300 L520 220 L470 170"/>
    <path d="M520 220 L570 170"/>
    <path d="M710 300 L710 220 L660 170"/>
    <path d="M710 220 L760 170"/>
  </g>
  <g fill="#e9fbff">
    <circle cx="140" cy="300" r="10"><animate attributeName="r" values="10;12;10" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="300" r="10"><animate attributeName="r" values="10;12;10" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="300" r="10"><animate attributeName="r" values="10;12;10" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="710" cy="300" r="10"><animate attributeName="r" values="10;12;10" dur="2.3s" repeatCount="indefinite"/></circle>
  </g>
  <text x="36" y="46" fill="#e7fbff" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Random Forest Ensemble</text>
  <text x="36" y="78" fill="#c7edf5" font-size="18" font-family="Segoe UI, Arial, sans-serif">Multiple decision trees combine for robust classification</text>
</svg>
