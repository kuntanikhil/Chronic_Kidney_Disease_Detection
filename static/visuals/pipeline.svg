<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Pipeline Visual">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#112f43"/>
      <stop offset="100%" stop-color="#147b8f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg4)"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#0d3345" font-weight="700">
    <rect x="70" y="165" width="150" height="58" rx="12" fill="#e6fbff"/>
    <rect x="260" y="165" width="150" height="58" rx="12" fill="#e6fbff"/>
    <rect x="450" y="165" width="150" height="58" rx="12" fill="#e6fbff"/>
    <rect x="640" y="165" width="110" height="58" rx="12" fill="#e6fbff"/>
    <text x="92" y="198">Input Data</text>
    <text x="284" y="198">Preprocess</text>
    <text x="478" y="198">Model Score</text>
    <text x="665" y="198">Result</text>
  </g>
  <g stroke="#dff8ff" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M222 194 L254 194"/>
    <path d="M412 194 L444 194"/>
    <path d="M602 194 L634 194"/>
    <circle cx="238" cy="194" r="5" fill="#ffd39c">
      <animate attributeName="cx" values="222;254;222" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="428" cy="194" r="5" fill="#ffd39c">
      <animate attributeName="cx" values="412;444;412" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="618" cy="194" r="5" fill="#ffd39c">
      <animate attributeName="cx" values="602;634;602" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="36" y="46" fill="#e7fbff" font-size="32" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Deployment Pipeline</text>
  <text x="36" y="78" fill="#c9eaf2" font-size="18" font-family="Segoe UI, Arial, sans-serif">From validated form values to model inference and user output</text>
</svg>
